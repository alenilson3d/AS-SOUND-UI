<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, orientation=landscape">
    <meta name="manifest" content="data:application/manifest+json,{'name':'Ui Player','short_name':'UiPlayer','display':'standalone','orientation':'landscape','start_url':'.'}">
    <title>Ui Soundcraft Player Pro - LED VU Version</title>
    <style>
        :root {
            --bg-dark: #111111;
            --ui-pink: #df1a5a;
            --ui-green: #00ff44;
            --ui-amber: #e1b428;
            --fader-red: #d12323;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        html, body {
            background-color: #000;
            color: #fff;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* --- TELA DE INTRODUÇÃO (SPLASH SCREEN) --- */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease-in-out, visibility 0.8s;
        }

        .splash-logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2.5vh;
            animation: splashEntrance 1.2s ease-out forwards;
        }

        .splash-box {
            font-style: italic;
            font-weight: 900;
            font-size: 8vh;
            color: #000;
            background: var(--ui-amber);
            padding: 0.5vh 3vw;
            border-radius: 8px;
            border: 2px solid #b88f14;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
            text-align: center;
        }

        .splash-text {
            font-weight: 900;
            font-size: 6.5vh;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #fff;
        }

        @keyframes splashEntrance {
            0% { opacity: 0; transform: scale(0.9); filter: blur(5px); }
            100% { opacity: 1; transform: scale(1); filter: blur(0); }
        }

        .ui-container {
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: var(--bg-dark);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- Top Bar --- */
        .top-bar {
            background: linear-gradient(to bottom, #5a5a5a 0%, #454545 15%, #2a2a2a 70%, #1e1e1e 100%);
            height: 10%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1vw;
            border-bottom: 2px solid #111;
            box-shadow: inset 0 1px 0 #777;
        }

        .nav-group { display: flex; gap: 2px; height: 90%; align-items: flex-end; }
        .nav-btn {
            background: linear-gradient(to bottom, #444, #2a2a2a);
            border: 1px solid #1a1a1a;
            border-radius: 4px 4px 0 0;
            color: #999;
            padding: 0 1.5vw;
            height: 85%;
            font-size: 1.8vh;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            display: flex;
            align-items: center;
            box-shadow: inset 0 1px 0 #555;
        }
        .nav-btn.active {
            background: linear-gradient(to bottom, #616161, #3a3a3a);
            color: #fff;
            border-bottom: 3px solid var(--ui-pink);
            height: 95%;
        }
        .nav-btn svg { width: 1.8vh; height: 1.8vh; margin-right: 4px; stroke: currentColor; fill: none; stroke-width: 2; }

        .right-info { display: flex; align-items: center; gap: 1vw; margin-left: auto; }
        .init-tag { color: #3fe3e3; font-family: monospace; background: #0d1a1a; padding: 2px 1vw; border-radius: 4px; border: 1px solid #224444; font-size: 1.8vh; }
        .ui-logo { font-style: italic; font-weight: 900; font-size: 2.5vh; color: #fff; background: linear-gradient(to bottom, #333, #111); padding: 1px 1vw; border-radius: 4px; border: 1px solid #444; }

        /* --- Mixer Body --- */
        .main-content { flex: 1; display: flex; background-color: #0b0b0b; height: 90%; overflow: hidden; }

        .channel-strip {
            width: 9vw;
            background: linear-gradient(to right, #242424, #181818);
            border-right: 2px solid #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1vh 0.3vw;
            height: 100%;
        }
        .channel-strip.master { border-right: none; border-left: 2px solid #000; }

        .db-display {
            background-color: #000; color: #4df0f0; font-family: monospace; font-size: 1.6vh;
            width: 95%; text-align: center; padding: 3px 0; border: 1px solid #333; border-radius: 2px;
        }

        .strip-buttons { display: flex; gap: 2px; width: 95%; margin: 0.5vh 0; }
        .strip-btn {
            flex: 1; font-size: 1.3vh; font-weight: 900; padding: 4px 0;
            background: linear-gradient(to bottom, #444, #262626); border: 1px solid #111; color: #999; border-radius: 2px; cursor: default;
        }

        .fader-vu-container {
            flex: 1; display: flex; width: 95%; justify-content: space-between;
            padding: 1vh 0.4vw; background: #0c0f12; border: 1px solid #1a222d; margin: 0.5vh 0; position: relative; overflow: hidden;
        }
        .channel-strip.master .fader-vu-container { margin-top: 1vh; margin-bottom: 1vh; }

        .vu-canvas-element {
            width: 1.2vw;
            max-width: 11px;
            height: 100%;
            background: #05070a;
            border-radius: 1px;
        }

        .fader-rail { width: 8px; background: #070707; height: 100%; position: relative; border-radius: 4px; margin: 0 auto; }
        .fader-handle {
            width: 3.5vh; height: 5vh; min-width: 24px; min-height: 32px;
            background: linear-gradient(to bottom, #ff3333 0%, var(--fader-red) 40%, #800000 50%, #4a0000 100%);
            position: absolute; left: 50%; transform: translateX(-50%); top: 35%; cursor: grab; border-radius: 3px; box-shadow: 0 3px 6px rgba(0,0,0,0.8);
            z-index: 5;
            border: 1px solid #000;
        }
        .fader-handle::after { content: ''; position: absolute; top: 50%; left: 0; width: 100%; height: 2px; background: #fff; transform: translateY(-50%); }
        .channel-strip.master .fader-handle { background: linear-gradient(to bottom, #ffffff 0%, #cccccc 40%, #777777 50%, #333333 100%); }

        .channel-label { background: #000; width: 100%; text-align: center; font-weight: bold; padding: 6px 0; text-transform: uppercase; font-size: 1.5vh; }
        .channel-label.player-l, .channel-label.player-r { color: var(--ui-pink); }
        .channel-label.master-lbl { color: var(--ui-amber); }

        /* --- Center Screen --- */
        .center-player { flex: 1; display: flex; flex-direction: column; background-color: #111; width: 73vw; height: 100%; position: relative; }

        /* MODIFICADO: Ajustado para acomodar a nova barra de progresso no meio */
        .transport-bar {
            background: linear-gradient(to bottom, #222, #151515); height: 12%;
            display: flex; align-items: center; justify-content: space-between; padding: 0 1vw; border-bottom: 1px solid #000;
            gap: 2vw;
        }
        .transport-buttons { display: flex; gap: 4px; align-items: center; flex-shrink: 0; }
        .trans-btn {
            background: linear-gradient(to bottom, #333, #1f1f1f); border: 1px solid #0a0a0a;
            color: #eee; width: 7vh; height: 5vh; cursor: pointer; border-radius: 3px; display: flex; align-items: center; justify-content: center;
        }
        .trans-btn svg { width: 2.2vh; height: 2vh; stroke: currentColor; fill: none; stroke-width: 2.5; }
        .trans-btn.active { background: var(--ui-pink) !important; }

        .add-music-btn {
            background: var(--ui-pink); border: 1px solid #900; color: white;
            font-size: 1.4vh; height: 5vh; padding: 0 1.2vw; border-radius: 3px; cursor: pointer;
            font-weight: bold; display: flex; align-items: center; gap: 4px; box-shadow: inset 0 1px 0 #ff6b9d;
        }
        .add-music-btn svg { width: 2vh; height: 2vh; stroke: currentColor; fill: none; stroke-width: 3; }

        .reset-eq-btn {
            display: none; 
            background: linear-gradient(to bottom, #444, #222); border: 1px solid #000; color: #ff4747;
            font-size: 1.4vh; height: 5vh; padding: 0 1.2vw; border-radius: 3px; cursor: pointer;
            font-weight: bold; align-items: center; gap: 4px; box-shadow: inset 0 1px 0 #666;
        }
        .reset-eq-btn svg { width: 2vh; height: 2vh; stroke: currentColor; fill: none; stroke-width: 2.5; }

        /* ADICIONADO: Estilo da nova barra de progresso no meio da transport-bar */
        .progress-container {
            flex: 1;
            display: flex;
            align-items: center;
            height: 100%;
            padding: 0 1vw;
        }
        .progress-bar-wrapper {
            width: 100%;
            height: 12px;
            background: #070707;
            border: 1px solid #252525;
            border-radius: 6px;
            position: relative;
            cursor: pointer;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, #be1249, var(--ui-pink));
            border-radius: 5px;
            transition: width 0.1s linear;
            box-shadow: 0 0 8px rgba(223, 26, 90, 0.5);
        }

        .time-counter { font-family: monospace; text-align: right; flex-shrink: 0; }
        .time-now { color: var(--ui-amber); font-size: 3vh; font-weight: bold; font-family: 'Courier New', monospace; line-height: 1; }
        .time-total { color: #777; font-size: 1.8vh; font-weight: bold; }

        /* Mídias */
        .browser-grid { display: flex; background-color: #151515; padding: 2px; height: 76%; overflow: hidden; gap: 2px; }
        .browser-column { flex: 1; background: #1c1c1c; border: 1px solid #2a2a2a; display: flex; flex-direction: column; height: 100%; overflow: hidden; }
        .column-header { background: #252525; padding: 6px 1vw; font-weight: bold; color: #999; border-bottom: solid 1px #000; text-transform: uppercase; font-size: 1.6vh; }
        
        .column-list { list-style: none; overflow-y: auto; flex: 1; background: #181818; }
        .column-item { padding: 1.2vh 1vw; border-bottom: 1px solid #222; cursor: pointer; font-size: 1.8vh; color: #ccc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 6px; }
        .column-item svg { width: 2vh; height: 2vh; stroke: currentColor; fill: none; stroke-width: 2; }
        
        .folder-item-content { display: flex; align-items: center; gap: 6px; width: 100%; justify-content: space-between; overflow: hidden; }
        .folder-text-wrapper { display: flex; align-items: center; gap: 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .delete-folder-btn { background: none; border: none; color: #666; cursor: pointer; display: flex; align-items: center; margin-left: auto; padding: 0 4px; transition: color 0.2s; }
        .delete-folder-btn:hover { color: #ff3333; }
        .delete-folder-btn svg { width: 1.8vh; height: 1.8vh; stroke: currentColor; fill: none; stroke-width: 2; }

        .column-item.active-folder { background-color: #252525; color: var(--ui-pink) !important; font-weight: bold; border-left: 4px solid var(--ui-pink); }
        .column-item.active-folder svg { stroke: var(--ui-pink); }
        .column-item.active-playing { color: var(--ui-pink) !important; font-weight: bold; border-left: 4px solid var(--ui-pink); }
        .column-item.active-playing svg { stroke: var(--ui-pink); }

        #file-input { display: none; }

        /* --- TELA DO EQUALIZADOR --- */
        .eq-container {
            display: none;
            flex: 1;
            height: 76%;
            background-color: #0b0f12;
            position: relative;
            box-sizing: border-box;
            border: 2px solid #222;
        }
        .eq-canvas { width: 100%; height: 100%; display: block; background: #070a0c; cursor: crosshair; }

        /* --- Footer --- */
        .footer-bar { background: #1c1c1c; height: 12%; border-top: 2px solid #000; display: flex; align-items: center; justify-content: space-between; padding: 0 4px; }
        .footer-group { display: flex; gap: 2px; }
        .foot-btn { background: linear-gradient(to bottom, #333, #222); border: 1px solid #000; color: #aaa; padding: 6px 1.5vw; font-size: 1.5vh; font-weight: bold; text-transform: uppercase; cursor: pointer; border-radius: 2px; }
        .foot-btn.active { background: var(--ui-pink); color: white; }
        .foot-btn.danger { color: #ff3333; }
        .foot-btn.warning { color: var(--ui-amber); }
        
        .foot-btn#btn-mute-fx.active-warn { background: var(--ui-amber) !important; color: #000 !important; font-weight: 900; }
        .foot-btn#btn-mute-all.active-danger { background: #ff3333 !important; color: #fff !important; font-weight: 900; }

        /* --- DESIGN DO NOVO MODAL PROFISSIONAL CENTRO DA TELA --- */
        .ui-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s ease, visibility 0.2s;
        }
        .ui-modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }
        .ui-modal-box {
            background: linear-gradient(to bottom, #2c2c2c 0%, #151515 100%);
            border: 2px solid #3d3d3d;
            border-top: 4px solid var(--ui-pink);
            border-radius: 8px;
            width: 48vw;
            max-width: 440px;
            padding: 3vh 2.5vw;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9);
            text-align: center;
            transform: scale(0.8);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.2);
        }
        .ui-modal-overlay.show .ui-modal-box {
            transform: scale(1);
        }
        .ui-modal-title {
            font-size: 2.4vh;
            font-weight: 900;
            text-transform: uppercase;
            color: #fff;
            margin-bottom: 2vh;
            letter-spacing: 1.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .ui-modal-title svg {
            width: 3vh;
            height: 3vh;
            stroke: var(--ui-pink);
            fill: none;
            stroke-width: 2.5;
        }
        .ui-modal-text {
            font-size: 1.9vh;
            color: #dddddd;
            margin-bottom: 3.5vh;
            line-height: 1.5;
            word-break: break-word;
        }
        .ui-modal-actions {
            display: flex;
            justify-content: center;
            gap: 1.5vw;
        }
        .modal-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 1.2vh 2.2vw;
            font-size: 1.6vh;
            font-weight: 900;
            text-transform: uppercase;
            border: 1px solid #000;
            border-radius: 4px;
            cursor: pointer;
            min-width: 110px;
            transition: background 0.2s, color 0.2s;
        }
        .modal-btn-confirm {
            background: var(--ui-pink);
            color: #fff;
            box-shadow: inset 0 1px 0 #ff6b9d;
        }
        .modal-btn-confirm:hover {
            background: #be1249;
        }
        .modal-btn-cancel {
            background: linear-gradient(to bottom, #444, #2a2a2a);
            color: #bbbbbb;
            box-shadow: inset 0 1px 0 #555;
        }
        .modal-btn-cancel:hover {
            background: #333;
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="splash-screen" id="app-splash-screen">
        <div class="splash-logo-container">
            <div class="splash-box">Ui</div>
            <div class="splash-text">SoundPlayer</div>
        </div>
    </div>

    <!-- CAIXA DE CONFIRMAÇÃO ESTILIZADA NO CENTRO DA TELA -->
    <div class="ui-modal-overlay" id="delete-modal">
        <div class="ui-modal-box">
            <div class="ui-modal-title">
                <svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                Remover Pasta
            </div>
            <div class="ui-modal-text" id="delete-modal-text">Deseja realmente apagar esta pasta?</div>
            <div class="ui-modal-actions">
                <button type="button" class="modal-btn modal-btn-cancel" onclick="closeDeleteModal()">Cancelar</button>
                <button type="button" class="modal-btn modal-btn-confirm" id="modal-confirm-btn">Confirmar</button>
            </div>
        </div>
    </div>

    <div class="ui-container">
        <header class="top-bar">
            <div class="nav-group">
                <button class="nav-btn active" id="nav-mix" onclick="showScreen('mix')">
                    <svg viewBox="0 0 24 24"><path d="M4 10h16M4 14h16M12 4v16M8 8H4M16 16h4"/></svg> Mix/Audio
                </button>
                <button class="nav-btn" id="nav-fx" onclick="showScreen('fx')">
                    <svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 14 13 2"/></svg> Fxsends
                </button>
            </div>
            <div class="right-info">
                <div class="init-tag">* Init *</div>
                <div class="ui-logo">Ui</div>
            </div>
        </header>

        <div class="main-content">
            <div class="channel-strip" id="strip-L">
                <div class="db-display" id="db-L">-0.0 dB</div>
                <div class="strip-buttons">
                    <button class="strip-btn">MUTE</button>
                    <button class="strip-btn">SOLO</button>
                </div>
                <div class="fader-vu-container">
                    <canvas id="canvas-vu-L1" class="vu-canvas-element"></canvas>
                    <div class="fader-rail"><div class="fader-handle" id="fader-L"></div></div>
                    <canvas id="canvas-vu-L2" class="vu-canvas-element"></canvas>
                </div>
                <div class="channel-label player-l">Player L</div>
            </div>

            <div class="channel-strip" id="strip-R">
                <div class="db-display" id="db-R">-0.0 dB</div>
                <div class="strip-buttons">
                    <button class="strip-btn">MUTE</button>
                    <button class="strip-btn">SOLO</button>
                </div>
                <div class="fader-vu-container">
                    <canvas id="canvas-vu-R1" class="vu-canvas-element"></canvas>
                    <div class="fader-rail"><div class="fader-handle" id="fader-R"></div></div>
                    <canvas id="canvas-vu-R2" class="vu-canvas-element"></canvas>
                </div>
                <div class="channel-label player-r">Player R</div>
            </div>

            <div class="center-player">
                <div class="transport-bar">
                    <div class="transport-buttons">
                        <button class="trans-btn" onclick="prevTrack()">
                            <svg viewBox="0 0 24 24"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="4" x2="5" y2="20"/></svg>
                        </button>
                        <button class="trans-btn" id="btn-play" onclick="togglePlay()">
                            <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                        </button>
                        <button class="trans-btn" onclick="stopAudio()">
                            <svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16"/></svg>
                        </button>
                        <button class="trans-btn" onclick="nextTrack()">
                            <svg viewBox="0 0 24 24"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="4" x2="19" y2="20"/></svg>
                        </button>
                        
                        <button class="add-music-btn" id="btn-add-files" onclick="document.getElementById('file-input').click()">
                            <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add Files
                        </button>
                        <input type="file" id="file-input" webkitdirectory directory multiple accept=".mp3,.m4a,.wav,.aac,audio/*" onchange="loadUserFiles(this.files)">

                        <button class="reset-eq-btn" id="btn-reset-eq" onclick="resetEqualizer()">
                            <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg> Reset EQ
                        </button>
                    </div>

                    <!-- ADICIONADO: Elemento estrutural da Barra de Progresso Interativa -->
                    <div class="progress-container">
                        <div class="progress-bar-wrapper" id="progress-bar-container" onclick="seekAudio(event)">
                            <div class="progress-bar-fill" id="progress-bar-fill"></div>
                        </div>
                    </div>

                    <div class="time-counter">
                        <div class="time-now" id="time-current">00:00</div>
                        <div class="time-total" id="time-duration">00:00</div>
                    </div>
                </div>

                <div class="browser-grid" id="screen-media-browser">
                    <div class="browser-column">
                        <div class="column-header">Pastas</div>
                        <ul class="column-list" id="folder-list-container"></ul>
                    </div>
                    <div class="browser-column">
                        <div class="column-header">Músicas</div>
                        <ul class="column-list" id="file-list-container"></ul>
                    </div>
                </div>

                <div class="eq-container" id="screen-equalizer">
                    <canvas id="eqCanvas" class="eq-canvas"></canvas>
                </div>

                <div class="footer-bar">
                    <div class="footer-group">
                        <button class="foot-btn active" id="btn-mode-auto" onclick="setPlaybackMode('auto')">Auto</button>
                        <button class="foot-btn" id="btn-mode-shuffle" onclick="setPlaybackMode('shuffle')">Shuffle</button>
                    </div>
                    <div class="footer-group">
                        <button class="foot-btn warning" id="btn-mute-fx" onclick="toggleMuteFX()">Mute Fx</button>
                        <button class="foot-btn danger" id="btn-mute-all" onclick="toggleMuteAll()">Mute All</button>
                    </div>
                </div>
            </div>

            <div class="channel-strip master">
                <div class="db-display" id="db-M">-0.0 dB</div>
                <div class="fader-vu-container">
                    <canvas id="canvas-vu-M1" class="vu-canvas-element"></canvas>
                    <div class="fader-rail"><div class="fader-handle" id="fader-M"></div></div>
                    <canvas id="canvas-vu-M2" class="vu-canvas-element"></canvas>
                </div>
                <div class="channel-label master-lbl">Master</div>
            </div>
        </div>
    </div>

    <script>
        let dpr = window.devicePixelRatio || 1;

        function showScreen(screenType) {
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            const btnAddFiles = document.getElementById('btn-add-files');
            const btnResetEq = document.getElementById('btn-reset-eq');

            if (screenType === 'mix') {

        const canvas = document.getElementById('eqCanvas');

        const minFreq = 20; const maxFreq = 20000;

        const nodeColors = [
            { color: '#2a5cd1', bg: 'rgba(42,92,209,0.35)' },
            { color: '#2ad15c', bg: 'rgba(42,209,92,0.35)' },
            { color: '#d12a2a', bg: 'rgba(209,42,42,0.35)' },

            { color: '#d1b62a', bg: 'rgba(209,182,42,0.35)' }

        function freqToX(freq) { return (Math.log10(freq) - Math.log10(minFreq)) / (Math.log10(maxFreq) - Math.log10(minFreq)); }
        function xToFreq(x) { return Math.pow(10, Math.log10(minFreq) + x * (Math.log10(maxFreq) - Math.log10(minFreq))); }

        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();

        function drawEQ() {
            const w = canvas.width / dpr; const h = canvas.height / dpr; ctx.clearRect(0, 0, w, h);
            
            ctx.lineWidth = 1;

            for (let f = 20; f <= 20000; f += (f < 100 ? 10 : f < 1000 ? 50 : f < 10000 ? 500 : 2000)) {
                let pInter = freqToX(f);
                ctx.beginPath(); ctx.strokeStyle = 'rgba(20, 28, 34, 0.4)';
                ctx.moveTo(pInter * w, 0); ctx.lineTo(pInter * w, h); ctx.stroke();
            }

            mainFreqs.forEach((f, idx) => {
                let p = freqToX(f);
                ctx.beginPath(); ctx.strokeStyle = 'rgba(30, 43, 53, 0.8)';
                ctx.moveTo(p * w, 0); ctx.lineTo(p * w, h); ctx.stroke();
                
                ctx.fillStyle = '#4e5e6a'; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
                ctx.fillText(labelsX[idx], p * w, h - 8);
            });

            let linesY = [0.15, 0.35, 0.55, 0.75, 0.90]; 
            let labelsY = ['+12', '+6', '0', '-6', '-12'];
            
            for (let percentY = 0.05; percentY <= 0.95; percentY += 0.05) {
                ctx.beginPath(); ctx.strokeStyle = 'rgba(20, 28, 34, 0.4)';
                ctx.moveTo(0, percentY * h); ctx.lineTo(w, percentY * h); ctx.stroke();
            }

            linesY.forEach((p, idx) => {
                ctx.beginPath(); ctx.strokeStyle = idx === 2 ? '#3a4b57' : 'rgba(30, 43, 53, 0.8)';
                ctx.moveTo(0, p * h); ctx.lineTo(w, p * h); ctx.stroke(); 
                ctx.fillStyle = '#4e5e6a'; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'left';
                ctx.fillText(labelsY[idx], 10, p * h - 4);
            });

            let sortedNodes = [...eqNodes].sort((a, b) => a.x - b.x);
            ctx.beginPath(); ctx.moveTo(0, h * 0.55);

            if (sortedNodes.length === 0) { ctx.lineTo(w, h * 0.55); } 
            else {
                for (let i = 0; i < sortedNodes.length; i++) {
                    let n = sortedNodes[i];
                    if (i === 0) { ctx.quadraticCurveTo(n.x * w - 15, n.y * h, n.x * w, n.y * h); } 
                    else {
                        let prev = sortedNodes[i - 1];
                        ctx.bezierCurveTo((prev.x + n.x)/2 * w, prev.y * h, (prev.x + n.x)/2 * w, n.y * h, n.x * w, n.y * h);

            ctx.fillStyle = 'rgba(255, 255, 255, 0.02)'; ctx.fill(shadowPath);
            ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 2.5; ctx.shadowBlur = 1; ctx.shadowColor = '#ffffff'; ctx.stroke(); ctx.shadowBlur = 0;

            eqNodes.forEach(node => {
                let nx = node.x * w; let ny = node.y * h;

                let nodeDbText = (nodeGain >= 0 ? "+" : "") + nodeGain.toFixed(1) + " dB";
                if (Math.abs(nodeGain) < 0.05) nodeDbText = "0.0 dB";

                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 12px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(nodeDbText, nx, ny - 22);
            });
        }

        function handleTrackEnded() {
            if (!playingFolder || !folders[playingFolder] || folders[playingFolder].length === 0) return;

            if (playbackMode === 'shuffle') {
                let totalTracks = folders[playingFolder].length;
                if (totalTracks > 1) {
                    let nextIndex = playingTrackIndex;
                    while (nextIndex === playingTrackIndex) {
                        nextIndex = Math.floor(Math.random() * totalTracks);

        function applyEQFilters() {
            if (!audioContext) return;

                midFilter.gain.value = 0;
                highFilter.gain.value = 0;
                return;
            }

            let avgLowGain = 0, avgMidGain = 0, avgHighGain = 0; let lowCount = 0, midCount = 0; let highCount = 0;

            eqNodes.forEach(node => {
                let freq = xToFreq(node.x); let gain = (1 - (node.y - 0.05) / 0.87) * 24 - 12;

            });

            if (lowCount > 0) lowFilter.gain.value = avgLowGain / lowCount;
            if (midCount > 0) midFilter.gain.value = avgMidGain / midCount;
            if (highCount > 0) highFilter.gain.value = avgHighGain / highCount;
        }

        function setupFader(id, type) {

                let offsetY = clientY - rect.top; 
                
                let percent = offsetY / rect.height;
                if (percent < 0) percent = 0; 
                if (percent > 0.93) percent = 0.93; 
                
                let normalizedPercent = percent / 0.93; 
                let db = 12 - (normalizedPercent * 24);
                
                if (db > -0.5 && db < 0.5) {

                if (percent >= 0.93) db = -12.0;

                let dbText = (db >= 0 ? "+" : "") + db.toFixed(1) + " dB";

        // --- ENGINE DO VU DE LED SEGMENTADO ---
        const totalLEDs = 20; const vuIds = ['L1', 'L2', 'R1', 'R2', 'M1', 'M2']; let vuCanvases = {};

        function initVUCases() {
            vuIds.forEach(id => {

            let ledHeight = (h / totalLEDs) - 1.5;

            if (currentLevel >= peaks[id]) { peaks[id] = currentLevel; peakCounters[id] = 18; } 
            else { if (peakCounters[id] > 0) { peakCounters[id]--; } else { peaks[id] -= 0.04; if (peaks[id] < 0) peaks[id] = 0; } }

            let litCount = Math.round(currentLevel * totalLEDs); let peakIndex = Math.round(peaks[id] * totalLEDs) - 1;

            for (let i = 0; i < totalLEDs; i++) {
                let isLit = i < litCount; let isPeak = i === peakIndex;
                let colorBase = ''; let glowColor = '';
                
                if (i < 14) { colorBase = '#006600'; glowColor = '#00ff22'; if (isLit || isPeak) colorBase = '#00ff22'; } 
                else if (i >= 14 && i < 17) { colorBase = '#665500'; glowColor = '#ffee00'; if (isLit || isPeak) colorBase = '#ffee00'; } 
                else { colorBase = '#660000'; glowColor = '#ff0000'; if (isLit || isPeak) colorBase = '#ff0000'; }

                let yPos = h - ((i + 1) * (h / totalLEDs)); ctxVU.fillStyle = colorBase;
                if (isLit || isPeak) { ctxVU.shadowBlur = 4; ctxVU.shadowColor = glowColor; } else { ctxVU.shadowBlur = 0; }
                ctxVU.fillRect(0, yPos, w, ledHeight);
            }
            ctxVU.shadowBlur = 0;
        }

        function renderVUs() {
            requestAnimationFrame(renderVUs);
            
            if (!audioContext || audioElement.paused || muteAllGlobal) { 
                vuIds.forEach(id => drawSegmentedVU(id, 0)); 
                return; 
            }
            
            let bufferL = new Float32Array(analyserL.fftSize);
            let bufferR = new Float32Array(analyserR.fftSize);
            analyserL.getFloatTimeDomainData(bufferL);
            analyserR.getFloatTimeDomainData(bufferR);

            let peakL = 0;
            let peakR = 0;
            
            for (let i = 0; i < bufferL.length; i++) {
                let valL = Math.abs(bufferL[i]);
                let valR = Math.abs(bufferR[i]);
                if (valL > peakL) peakL = valL;
                if (valR > peakR) peakR = valR;
            }

            let rawL = peakL; 
            let rawR = peakR;
            let rawM = ((peakL + peakR) / 2) * (volMaster > -12 ? Math.pow(10, volMaster / 20) : 0);

            let levelL = Math.min(rawL, 1); 
            let levelR = Math.min(rawR, 1); 
            let levelM = Math.min(rawM, 1);

            drawSegmentedVU('L1', levelL); drawSegmentedVU('L2', levelL);
            drawSegmentedVU('R1', levelR); drawSegmentedVU('R2', levelR);
            drawSegmentedVU('M1', levelM); drawSegmentedVU('M2', levelM);
        }
    </script>
